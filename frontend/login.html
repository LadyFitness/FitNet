<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Sign In — FitPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Extra centering overrides */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .auth-page {
      margin: 0 auto;
      width: 100%;
      max-width: 1100px;
    }
    .auth-visual, .auth-form-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    @media (max-width: 800px) {
      body { padding: 20px; }
      .auth-page { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="auth-page">
  <aside class="auth-visual">
    <p style="font-size:1.5rem;font-weight:bold;">🌸 FitPulse</p>
    <h1>Welcome back,<br/>champion.</h1>
    <p>Your goals are waiting. Let's pick up where you left off.</p>
    <div style="display:flex;gap:24px;margin-top:32px;">
      <div>🔥 7-day streak</div>
      <div>💪 PB this week</div>
      <div>⚡ On track</div>
    </div>
  </aside>
  <section class="auth-form-side">
    <div class="auth-card">
      <h1 style="font-family:'Playfair Display';">Welcome back</h1>
      <p>Sign in to access your fitness dashboard</p>
      <div id="alertMessage" class="alert"></div>
      
      <!-- Google Sign-In Button -->
      <button id="googleSignInBtn" class="btn oauth-btn" style="background: white; color: #2D2A2E; border: 1px solid #FBCFE8; width: 100%; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        🌐 Sign in with Google
      </button>
      
      <hr class="divider" style="margin: 20px 0; border-color: #FFE4EC;" />
      
      <form id="loginForm">
        <input class="form-input" type="email" id="email" placeholder="Email" required>
        <input class="form-input" type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn">Sign In →</button>
      </form>
      <p style="text-align:center; margin-top:20px;">
        Don't have an account? <a href="register.html" style="color:#DB2777;">Create one free</a>
      </p>
    </div>
  </section>
</div>
<script type="module" src="js/login.js"></script>
</body>
</html>
